name: 🚀 InstaIntel Pipeline

on:
  schedule:
    - cron: '0 2 */2 * *'   # Every 2 days at 2:00 AM UTC (7:30 AM IST)
  workflow_dispatch:          # Manual trigger from GitHub UI anytime

jobs:
  run-pipeline:
    name: Scrape → Transcribe → Analyse → Store
    runs-on: ubuntu-latest
    timeout-minutes: 90       # Kill if hanging beyond 90 mins

    steps:

      # ── 1. Checkout code ──────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Python dependencies ───────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Install ffmpeg (for audio extraction) ─────────
      - name: 🎵 Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # ── 5. Install yt-dlp (for video download) ────────────
      - name: 📹 Install yt-dlp
        run: |
          pip install yt-dlp
          yt-dlp --version

      # ── 6. Run the pipeline ───────────────────────────────
      - name: ⚡ Run InstaIntel Pipeline
        env:
          APIFY_API_TOKEN:          ${{ secrets.APIFY_API_TOKEN }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          MONGO_URI:                ${{ secrets.MONGO_URI }}
          MONGO_DB:                 insta_intel
          OPENAI_MODEL:             gpt-4o-mini
          WHISPER_MODEL:            whisper-1
          PIPELINE_INTERVAL_DAYS:   2
          DOWNLOAD_DIR:             /tmp/insta_intel_videos
          AUDIO_DIR:                /tmp/insta_intel_audio
          APIFY_RESULTS_PER_ACC:    10
        run: |
          python -m pipeline.run_pipeline

      # ── 7. Notify on success ──────────────────────────────
      - name: ✅ Pipeline complete
        if: success()
        run: |
          echo "Pipeline completed successfully at $(date)"
          echo "Dashboard at: https://your-app.streamlit.app"

      # ── 8. Notify on failure ──────────────────────────────
      - name: ❌ Pipeline failed
        if: failure()
        run: |
          echo "Pipeline FAILED at $(date)"
          echo "Check logs above for errors"
